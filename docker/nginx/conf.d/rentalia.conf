# Rentalia.mx - Configuración del servidor web
server {
    listen 80;
    server_name localhost rentalia.local;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Logs específicos
    access_log /var/log/nginx/rentalia_access.log;
    error_log /var/log/nginx/rentalia_error.log;

    # Configuración de archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache para archivos estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }
    }

    # API endpoints (futuro)
    location /api/ {
        # Proxy pass al backend cuando esté disponible
        # proxy_pass http://api:3000;
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection 'upgrade';
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_cache_bypass $http_upgrade;
        
        # Rate limiting para API
        # limit_req zone=api burst=20 nodelay;
        
        # Por ahora, devolver 503
        return 503 "API en desarrollo";
    }

    # Admin panel (futuro)
    location /admin/ {
        # Proxy pass al panel admin cuando esté disponible
        # proxy_pass http://admin:8081;
        
        # Por ahora, devolver 503
        return 503 "Panel admin en desarrollo";
    }

    # Healthcheck
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Robots.txt
    location = /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
        log_not_found off;
        access_log off;
    }

    # Sitemap.xml
    location = /sitemap.xml {
        alias /usr/share/nginx/html/sitemap.xml;
        log_not_found off;
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.ico;
        log_not_found off;
        access_log off;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Denegar acceso a archivos de configuración
    location ~* \.(conf|config|bak|backup|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}