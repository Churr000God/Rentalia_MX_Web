# rentalia.mx - frontend estático + proxy a FastAPI en /api/
server {
  listen 80;
  server_name _;

  # Raíz del frontend (montada por Docker)
  root /usr/share/nginx/html;
  index index.html;

  # Seguridad básica
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Compresión y cache estática
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 1024;

  # Archivos estáticos: cache agresiva (ajusta si haces invalidación por hash de nombre)
  location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # App SPA: servir index.html cuando no exista el archivo
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API → backend FastAPI (servicio 'backend' en la red del compose)
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;

    # Encabezados comunes
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets (si algún endpoint lo usa)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts y buffers
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 10m;
  }

  # Map eliminado: no permitido en server{} dentro de conf.d
}
